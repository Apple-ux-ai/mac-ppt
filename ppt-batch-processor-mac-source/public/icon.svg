<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- 主文档图标 (PPT) -->
  <g filter="url(#shadow)">
    <!-- 文档主体 -->
    <path d="M 160 100 L 320 100 L 380 160 L 380 400 Q 380 420 360 420 L 180 420 Q 160 420 160 400 Z" 
          fill="url(#docGradient)" stroke="#D0D0D0" stroke-width="2"/>
    
    <!-- 折角 -->
    <path d="M 320 100 L 320 160 L 380 160" fill="#E8E8E8" stroke="#D0D0D0" stroke-width="2"/>
    
    <!-- PPT 文字 -->
    <text x="270" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
          fill="#FF6B35" text-anchor="middle">PPT</text>
  </g>
  
  <!-- 批量处理符号 - 三个小文档叠加 -->
  <g transform="translate(300, 240)" opacity="0.9">
    <!-- 第三层 -->
    <rect x="20" y="20" width="80" height="100" rx="8" fill="#FFB84D" opacity="0.6"/>
    <!-- 第二层 -->
    <rect x="10" y="10" width="80" height="100" rx="8" fill="#FFA033" opacity="0.8"/>
    <!-- 第一层 -->
    <rect x="0" y="0" width="80" height="100" rx="8" fill="#FF8C1A" stroke="#FFFFFF" stroke-width="3"/>
    
    <!-- 批量符号 -->
    <text x="40" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
          fill="#FFFFFF" text-anchor="middle">×3</text>
  </g>
  
  <!-- 工具箱图标 -->
  <g transform="translate(100, 320)">
    <!-- 工具箱手柄 -->
    <path d="M 40 0 Q 40 -15 55 -15 L 85 -15 Q 100 -15 100 0" 
          fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    
    <!-- 工具箱主体 -->
    <rect x="20" y="0" width="100" height="60" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="25" y="5" width="90" height="50" rx="6" fill="none" stroke="#FF6B35" stroke-width="3"/>
    
    <!-- 工具图标 -->
    <circle cx="50" cy="30" r="8" fill="#FF6B35"/>
    <rect x="67" y="22" width="16" height="16" rx="2" fill="#FF6B35"/>
    <path d="M 95 22 L 105 32 L 95 42" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
