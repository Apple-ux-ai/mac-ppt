# 在无本地 Mac 时：在 GitHub 的 macOS _runner 上打包，完成后从 Actions 页下载 Artifact。
# 使用说明：推送本仓库后，打开 GitHub → Actions →「Build macOS zip」→ Run workflow。

name: Build macOS zip

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ppt-batch-processor-mac-source/**'
      - '.github/workflows/build-macos-zip.yml'

jobs:
  mac-zip:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ppt-batch-processor-mac-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ppt-batch-processor-mac-source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and Vite build
        run: npx vue-tsc -b && npx vite build

      - name: electron-builder (mac zip)
        run: npx electron-builder --config electron-builder.mac.yml --mac zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release-mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip-${{ github.sha }}
          path: ppt-batch-processor-mac-source/release-mac/*.zip
          if-no-files-found: error
