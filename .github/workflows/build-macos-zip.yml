# 在无本地 Mac 时：在 GitHub 的 macOS runner 上分别打 arm64（Apple Silicon）与 x64（Intel）zip。
# 完成后在 Actions 里可下载两个 Artifact：macos-zip-arm64、macos-zip-x64。

name: Build macOS zip

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ppt-batch-processor-mac-source/**'
      - '.github/workflows/build-macos-zip.yml'

jobs:
  mac-zip:
    name: mac zip (${{ matrix.arch }})
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    defaults:
      run:
        working-directory: ppt-batch-processor-mac-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ppt-batch-processor-mac-source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and Vite build
        run: npx vue-tsc -b && npx vite build

      # 显式指定架构，避免在 Apple Silicon runner 上只产出单一架构
      - name: electron-builder (mac zip ${{ matrix.arch }})
        run: npx electron-builder --config electron-builder.mac.yml --mac zip --publish never --${{ matrix.arch }}

      - name: Upload zip (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip-${{ matrix.arch }}
          path: ppt-batch-processor-mac-source/release-mac/*.zip
          if-no-files-found: error
